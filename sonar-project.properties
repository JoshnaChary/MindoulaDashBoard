# SonarCloud configuration

# Must be unique in a given SonarCloud organization
sonar.projectKey=JoshnaChary_MindoulaDashBoard
sonar.organization=joshnachary

# Path to the source code
sonar.sources=src

# Excluded paths for logic
sonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/coverage/**,.next/**,.nuxt/**,out/**,android/**,ios/**

# Coverage Exclusions
sonar.coverage.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/coverage/**,android/**,ios/**,src/core/navigation/**,src/core/services/**,src/data/models/**,src/core/constants/strings.ts,src/presentation/screens/Billing/BillingScreen.tsx,src/presentation/screens/Dashboard/FigmaDashboardView.tsx,src/presentation/screens/Messages/MessagingCenterView.tsx

# Coverage report mapped to Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
